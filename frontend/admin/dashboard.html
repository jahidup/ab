<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard · NexGen Exam</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>NexGen Admin</h2>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-tab="dashboard">📊 Dashboard</button>
        <button class="nav-item" data-tab="students">👥 Students</button>
        <button class="nav-item" data-tab="tests">📝 Tests</button>
        <button class="nav-item" data-tab="questions">❓ Questions</button>
        <button class="nav-item" data-tab="results">🏆 Results</button>
        <button class="nav-item" data-tab="discussions">💬 Discussions</button>
        <button class="nav-item" data-tab="messages">✉️ Messages</button>
        <button class="nav-item" data-tab="blocked">🚫 Blocked</button>
        <button class="nav-item" data-tab="monitor">🖥️ Monitor</button>
        <button class="nav-item" data-tab="settings">⚙️ Settings</button>
      </nav>
      <div class="sidebar-footer">
        <a href="https://nexgenaitech.online" target="_blank">Powered by <strong>NexGenAiTech</strong></a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="main-header">
        <h1 id="pageTitle">Dashboard</h1>
        <div class="header-actions">
          <span class="refresh-btn" onclick="refreshCurrentTab()">↻</span>
          <button id="logoutBtn" class="btn-outline">Logout</button>
        </div>
      </header>

      <div class="content-area">
        <!-- All tab panes -->
        <div id="dashboard" class="tab-pane active">...</div>
        <div id="students" class="tab-pane">...</div>
        <div id="tests" class="tab-pane">...</div>
        <div id="questions" class="tab-pane">...</div>
        <div id="results" class="tab-pane">...</div>
        <div id="discussions" class="tab-pane">...</div>
        <div id="messages" class="tab-pane">...</div>
        <div id="blocked" class="tab-pane">...</div>
        <div id="monitor" class="tab-pane">...</div>
        <div id="settings" class="tab-pane">...</div>
      </div>
    </main>
  </div>

  <!-- Modal overlay -->
  <div id="modalOverlay" class="modal-overlay" style="display:none;">
    <div class="modal" id="modalContent"></div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
