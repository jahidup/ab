<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard | NexGenAiTech</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>Exam Portal Admin</h1>
      </div>
      <div class="header-right">
        <a href="https://nexgenaitech.online" target="_blank" class="powered-by">
          Powered by <strong>NexGenAiTech</strong>
        </a>
        <button id="logoutBtn">Logout</button>
      </div>
    </header>
    <nav class="tabs">
      <button class="tablink active" data-tab="dashboard">Dashboard</button>
      <button class="tablink" data-tab="students">Students</button>
      <button class="tablink" data-tab="tests">Tests</button>
      <button class="tablink" data-tab="questions">Questions</button>
      <button class="tablink" data-tab="results">Results</button>
      <button class="tablink" data-tab="discussions">Discussions</button>
      <button class="tablink" data-tab="messages">Messages</button>
      <button class="tablink" data-tab="blocked">Blocked</button>
      <button class="tablink" data-tab="monitor">Monitor Tests</button>
      <button class="tablink" data-tab="settings">Settings</button>
    </nav>

    <!-- Tab contents (Dashboard, Students, Tests, Questions, Results, Discussions, Messages, Blocked) similar to before but enhanced -->
    <!-- New Monitor Tab for pause/resume -->
    <div id="monitor" class="tabcontent">
      <h2>Live Test Monitoring <span class="refresh" onclick="loadActiveTests()">↻</span></h2>
      <select id="activeTestSelect" onchange="loadTestTakers()">
        <option value="">-- Select Test --</option>
      </select>
      <table id="testTakersTable">
        <thead><tr><th>Student ID</th><th>Name</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- Settings Tab -->
    <div id="settings" class="tabcontent">
      <h2>Settings</h2>
      <p>Credentials are managed via Vercel Environment Variables.</p>
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay" style="display:none;">
    <div class="modal" id="modalContent"></div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
