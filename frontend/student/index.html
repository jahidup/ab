<!DOCTYPE html>
<html>
<head>
  <title>Student Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <h2>Student Login</h2>
    <input type="text" id="studentId" placeholder="Student ID">
    <input type="text" id="dob" placeholder="DOB (DDMMYYYY)">
    <button id="loginBtn">Login</button>
    <p id="errorMsg"></p>
    <div id="blockedMsg" style="display:none;">
      <p>Your account is blocked. Reason: <span id="blockReason"></span></p>
      <textarea id="unblockRequestMsg" placeholder="Optional message to admin"></textarea>
      <button onclick="sendUnblockRequest()">Request Unblock</button>
    </div>
  </div>
  <script>
    let blockedStudentId = null;
    document.getElementById('loginBtn').onclick = async () => {
      const studentId = document.getElementById('studentId').value;
      const dob = document.getElementById('dob').value;
      const res = await fetch('/api/auth/student/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ studentId, dob })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('student', JSON.stringify(data.student));
        location.href = 'dashboard.html';
      } else if (data.blocked) {
        blockedStudentId = studentId;
        document.getElementById('blockReason').innerText = data.reason;
        document.getElementById('blockedMsg').style.display = 'block';
        document.getElementById('errorMsg').innerText = '';
      } else {
        document.getElementById('errorMsg').innerText = data.message;
      }
    };
    async function sendUnblockRequest() {
      const msg = document.getElementById('unblockRequestMsg').value;
      await fetch('/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ studentId: blockedStudentId, sender: 'student', content: msg || 'Please unblock my account', isUnblockRequest: true })
      });
      alert('Unblock request sent to admin.');
      document.getElementById('blockedMsg').style.display = 'none';
    }
  </script>
</body>
</html>
