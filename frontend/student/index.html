<!DOCTYPE html>
<html>
<head>
  <title>Student Login | NexGenAiTech</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <h2>Student Login</h2>
    <input type="text" id="studentId" placeholder="Student ID">
    <input type="text" id="dob" placeholder="DOB (DDMMYYYY)">
    <button id="loginBtn">Login</button>
    <p id="errorMsg"></p>
    <div id="blockedMsg" style="display:none;">
      <p>Account blocked. Reason: <span id="blockReason"></span></p>
      <textarea id="unblockRequestMsg" placeholder="Optional message"></textarea>
      <button onclick="sendUnblockRequest()">Request Unblock</button>
    </div>
  </div>
  <script>
    // ... (similar to before but with correct redirect)
    location.href = 'dashboard.html';
  </script>
</body>
</html>
