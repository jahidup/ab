<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login · NexGen Exam</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <h2>Student Portal</h2>
        <p>Enter your credentials to continue</p>
      </div>
      <div class="login-body">
        <div class="input-group">
          <label>Student ID</label>
          <input type="text" id="studentId" placeholder="e.g. 2024CS001" autocomplete="off">
        </div>
        <div class="input-group">
          <label>Date of Birth (DDMMYYYY)</label>
          <input type="text" id="dob" placeholder="01012005" maxlength="8">
        </div>
        <button id="loginBtn" class="btn-primary" style="width:100%;">
          <span id="loginText">Sign In</span>
          <span id="loginSpinner" class="loading-spinner" style="display:none;"></span>
        </button>
        <p id="errorMsg" class="error-msg"></p>
      </div>
      <div class="login-footer">
        <a href="https://nexgenaitech.online" target="_blank">Powered by <strong>NexGenAiTech</strong></a>
      </div>
    </div>

    <!-- Blocked Modal -->
    <div id="blockedModal" class="modal-overlay" style="display:none;">
      <div class="modal">
        <h3>Account Blocked</h3>
        <p>Your account has been blocked.</p>
        <p><strong>Reason:</strong> <span id="blockReason"></span></p>
        <div class="input-group">
          <label>Message to Admin (optional)</label>
          <textarea id="unblockMessage" rows="2"></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn-primary" onclick="sendUnblockRequest()">Request Unblock</button>
          <button class="btn-outline" onclick="closeBlockedModal()">Close</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    // Prevent loops
    if (localStorage.getItem('student')) {
      location.replace('dashboard.html');
    }

    let blockedStudentId = null;

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const studentId = document.getElementById('studentId').value.trim();
      const dob = document.getElementById('dob').value.trim();
      const errorEl = document.getElementById('errorMsg');
      const btn = document.getElementById('loginBtn');
      const text = document.getElementById('loginText');
      const spinner = document.getElementById('loginSpinner');

      if (!studentId || !dob) {
        errorEl.textContent = 'Please fill in all fields';
        return;
      }

      btn.disabled = true;
      text.style.display = 'none';
      spinner.style.display = 'inline-block';
      errorEl.textContent = '';

      try {
        const res = await fetch('/api/auth/student/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ studentId, dob })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('student', JSON.stringify(data.student));
          location.replace('dashboard.html');
        } else if (data.blocked) {
          blockedStudentId = studentId;
          document.getElementById('blockReason').textContent = data.reason;
          document.getElementById('blockedModal').style.display = 'flex';
        } else {
          errorEl.textContent = data.message || 'Login failed';
        }
      } catch (err) {
        errorEl.textContent = 'Network error. Please try again.';
      } finally {
        btn.disabled = false;
        text.style.display = 'inline';
        spinner.style.display = 'none';
      }
    });

    window.sendUnblockRequest = async () => {
      const msg = document.getElementById('unblockMessage').value.trim() || 'Please unblock my account';
      try {
        await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ studentId: blockedStudentId, sender: 'student', content: msg, isUnblockRequest: true })
        });
        alert('Request sent to admin.');
        closeBlockedModal();
      } catch (err) {
        alert('Failed to send request.');
      }
    };

    window.closeBlockedModal = () => {
      document.getElementById('blockedModal').style.display = 'none';
      blockedStudentId = null;
    };
  </script>
</body>
</html>
