<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard · NexGen Exam</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>NexGen Student</h2>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-tab="availableTests">📋 Available Tests</button>
        <button class="nav-item" data-tab="previousResults">📈 My Results</button>
        <button class="nav-item" data-tab="discussions">💬 Discussions</button>
        <button class="nav-item" data-tab="messages">✉️ Messages</button>
      </nav>
      <div class="sidebar-footer">
        <a href="https://nexgenaitech.online" target="_blank">Powered by <strong>NexGenAiTech</strong></a>
      </div>
    </aside>

    <main class="main-content">
      <header class="main-header">
        <h1 id="pageTitle">Available Tests</h1>
        <div class="header-actions">
          <span class="refresh-btn" onclick="refreshCurrentTab()">↻</span>
          <button id="logoutBtn" class="btn-outline">Logout</button>
        </div>
      </header>

      <div class="profile-card">
        <div class="profile-info">
          <h3>Welcome, <span id="studentName"></span></h3>
          <p>ID: <span id="studentIdDisplay"></span> | DOB: <span id="dobDisplay"></span> | Class: <span id="classDisplay"></span></p>
        </div>
        <div class="profile-stats">
          <div class="stat-item">Tests Taken: <span id="testsTaken">0</span></div>
          <div class="stat-item">Avg Score: <span id="avgScore">0</span></div>
        </div>
      </div>

      <div class="content-area">
        <div id="availableTests" class="tab-pane active">
          <div id="testsList" class="tests-grid"></div>
        </div>

        <div id="previousResults" class="tab-pane">
          <table id="resultsTable" class="data-table">
            <thead><tr><th>Test</th><th>Score</th><th>Rank</th><th>Submitted</th><th>Analysis</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>

        <div id="discussions" class="tab-pane">
          <div class="action-bar">
            <select id="testSelectDiscussions" onchange="loadDiscussions()">
              <option value="">-- Select Test --</option>
            </select>
          </div>
          <div id="discussionsList" class="discussions-list"></div>
        </div>

        <div id="messages" class="tab-pane">
          <div id="messagesContainer" class="messages-container"></div>
          <div class="message-input-area">
            <textarea id="newMessage" placeholder="Type your message..."></textarea>
            <button class="btn-primary" onclick="sendMessage()">Send</button>
            <p id="messageWarning" class="warning-text"></p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Test Modal -->
  <div id="testModal" class="modal-overlay" style="display:none;">
    <div class="modal test-modal">
      <div id="testInterface"></div>
    </div>
  </div>

  <!-- Global Loading Overlay -->
  <div id="globalLoading" class="loading-overlay" style="display:none;">
    <div class="loading-spinner-large"></div>
  </div>

  <script src="student.js"></script>
  <script>
    // Immediate auth check
    if (!localStorage.getItem('student')) {
      location.replace('index.html');
    }
  </script>
</body>
</html>
