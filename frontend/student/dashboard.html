<!DOCTYPE html>
<html>
<head>
  <title>Student Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Welcome, <span id="studentName"></span></h1>
      <button id="logoutBtn">Logout</button>
    </header>
    <div class="profile-card">
      <p>ID: <span id="studentIdDisplay"></span> | DOB: <span id="dobDisplay"></span></p>
      <p>Tests Taken: <span id="testsTaken">0</span> | Avg Score: <span id="avgScore">0</span></p>
    </div>
    <nav class="tabs">
      <button class="tablink active" data-tab="availableTests">Available Tests</button>
      <button class="tablink" data-tab="previousResults">Previous Results</button>
      <button class="tablink" data-tab="discussions">Discussions</button>
      <button class="tablink" data-tab="messages">Messages</button>
    </nav>

    <div id="availableTests" class="tabcontent active">
      <h2>Available Tests <span class="refresh" onclick="loadAvailableTests()">↻</span></h2>
      <div id="testsList"></div>
    </div>

    <div id="previousResults" class="tabcontent">
      <h2>Your Results <span class="refresh" onclick="loadResults()">↻</span></h2>
      <table id="resultsTable">
        <thead><tr><th>Test</th><th>Score</th><th>Rank</th><th>Date</th><th>Analysis</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="discussions" class="tabcontent">
      <h2>Discussions <span class="refresh" onclick="loadDiscussions()">↻</span></h2>
      <select id="testSelectDiscussions" onchange="loadDiscussions()">
        <option value="">-- Select Test --</option>
      </select>
      <div id="discussionsList"></div>
    </div>

    <div id="messages" class="tabcontent">
      <h2>Messages with Admin <span class="refresh" onclick="loadMessages()">↻</span></h2>
      <div id="messagesContainer"></div>
      <textarea id="newMessage" placeholder="Type your message..."></textarea>
      <button onclick="sendMessage()">Send</button>
      <p id="messageWarning" style="color:red;"></p>
    </div>
  </div>

  <!-- Test Taking Modal -->
  <div id="testModal" class="modal-overlay" style="display:none;">
    <div class="modal" style="max-width:1000px; width:95%;">
      <div id="testInterface"></div>
    </div>
  </div>

  <script src="student.js"></script>
</body>
</html>
