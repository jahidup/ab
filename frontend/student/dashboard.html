<!DOCTYPE html>
<html>
<head>
  <title>Student Portal | NexGenAiTech</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>Welcome, <span id="studentName"></span></h1>
      </div>
      <div class="header-right">
        <a href="https://nexgenaitech.online" target="_blank" class="powered-by">
          Powered by <strong>NexGenAiTech</strong>
        </a>
        <button id="logoutBtn">Logout</button>
      </div>
    </header>
    <div class="profile-card">
      <p>ID: <span id="studentIdDisplay"></span> | DOB: <span id="dobDisplay"></span> | Class: <span id="classDisplay"></span></p>
      <p>Tests Taken: <span id="testsTaken">0</span> | Avg Score: <span id="avgScore">0</span></p>
    </div>
    <nav class="tabs">
      <button class="tablink active" data-tab="availableTests">Available Tests</button>
      <button class="tablink" data-tab="previousResults">Previous Results</button>
      <button class="tablink" data-tab="discussions">Discussions</button>
      <button class="tablink" data-tab="messages">Messages</button>
    </nav>

    <!-- Tab contents -->
    <div id="availableTests" class="tabcontent active">
      <h2>Available Tests <span class="refresh" onclick="loadAvailableTests()">↻</span></h2>
      <div id="testsList"></div>
    </div>
    <!-- other tabs -->
  </div>

  <!-- Test Modal -->
  <div id="testModal" class="modal-overlay" style="display:none;">
    <div class="modal" style="max-width:1000px;">
      <div id="testInterface"></div>
    </div>
  </div>

  <script src="student.js"></script>
</body>
</html>
